minimumLimaVersion: 2.0.0

base:
- template:_images/rocky-8

vmType: qemu
arch: x86_64
cpus: 4
memory: 6GiB
disk: 30GiB
mountType: reverse-sshfs

containerd:
  system: false
  user: false

provision:
- mode: system
  script: |
    #!/bin/bash
    set -euo pipefail
    dnf install -y fuse-sshfs

mounts:
- location: "~"
  writable: false

networks:
- lima: user-v2
