name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The BPF object loader (internal/bpf/lustreebpfexporter_*_bpfel.go) is
      # generated by bpf2go and gitignored, so CI must regenerate it before
      # any package that imports internal/bpf can build. Toolchain list
      # mirrors build/docker/go-exporter.Dockerfile so local Docker builds
      # and CI stay in sync.
      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev libelf-dev linux-libc-dev

      - name: Generate BPF bindings
        env:
          BPF_CFLAGS: "-I. -I/usr/include/x86_64-linux-gnu -D__TARGET_ARCH_x86"
        run: make generate-go-exporter GOOS=linux GOARCH=amd64

      - name: Run tests
        run: go test ./...
