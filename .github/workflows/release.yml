name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The exporter keeps CGO_ENABLED=1 for libc-backed user lookups
      # (os/user / nsswitch), so cross-building linux/arm64 needs both the
      # arm64 cgo toolchain and arm64 BPF/elf headers (linux-libc-dev:arm64,
      # libbpf-dev:arm64, libelf-dev:arm64) in addition to the amd64
      # toolchain used by bpf2go on the host.
      - name: Install BPF and cross toolchains
        run: |
          set -eux
          sudo dpkg --add-architecture arm64
          # The default ubuntu mirrors on ubuntu-latest do not carry arm64
          # ports, so restrict them to amd64/i386 and add ports.ubuntu.com
          # for arm64. Skip files whose entries already declare an arch
          # (third-party repos like microsoft-prod.list) to avoid double
          # injection; only ubuntu's own sources need rewriting.
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] || continue
            grep -Eq '^deb (\[|cdrom)' "$f" && continue
            sudo sed -i 's/^deb /deb [arch=amd64,i386] /' "$f"
          done
          # Ubuntu 24.04+ ships /etc/apt/sources.list.d/ubuntu.sources in
          # deb822 format. Only inject Architectures there; third-party
          # deb822 files are left alone.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ] \
              && ! grep -q '^Architectures:' /etc/apt/sources.list.d/ubuntu.sources; then
            sudo sed -i '/^Types:/a Architectures: amd64 i386' /etc/apt/sources.list.d/ubuntu.sources
          fi
          codename="$(lsb_release -cs)"
          sudo tee /etc/apt/sources.list.d/arm64-ports.list >/dev/null <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm make \
            libbpf-dev libelf-dev linux-libc-dev \
            gcc-aarch64-linux-gnu \
            libbpf-dev:arm64 libelf-dev:arm64 linux-libc-dev:arm64

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
